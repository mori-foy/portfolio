<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon — Minami Morikawa</title>
<meta name="description" content="このプロジェクトは現在制作中です" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<!-- scroll progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- grain overlay -->
<div class="grain" aria-hidden="true"></div>

<!-- floating pastel blobs (parallax) -->
<div class="blobs" aria-hidden="true">
  <div class="blob blob-a" data-speed="0.15"></div>
  <div class="blob blob-c" data-speed="0.10"></div>
</div>

<header class="site-header">
  <a class="logo" href="../index.html">P<span class="logo-dot">.</span></a>
  <nav class="nav">
    <a href="../index.html#about">About</a>
    <a href="../index.html#works">Projects</a>
    <a href="../index.html#contact">Contact</a>
  </nav>
</header>

<main>
  <article class="wp">

    <a class="wp-back reveal" href="../index.html#works">← Projects に戻る</a>

    <header class="wp-head">
      <p class="wp-meta reveal" id="csMeta">Project</p>
      <h1 class="wp-title" data-split id="csTitle">Coming Soon</h1>
      <p class="wp-sub reveal delay-1">このプロジェクトは現在制作中です</p>
    </header>

    <div class="wp-hero reveal">
      <span class="thumb-label">COMING SOON</span>
    </div>

    <section class="wp-section reveal">
      <h2><span class="wp-section-num">01</span>Overview</h2>
      <p>
        現在制作中です。公開までもうしばらくお待ちください。
      </p>
    </section>

    <div class="wp-back-bottom-wrap reveal">
      <a class="wp-back-bottom" href="../index.html#works">← Projects に戻る</a>
    </div>

  </article>
</main>

<footer class="site-footer">
  <p>&copy; 2026 Minami Morikawa — made with soft colors</p>
</footer>

<script>
  // ?title=◯◯&meta=◯◯ でタイトルとカテゴリを差し替える(main.js の split 処理より先に実行)
  (() => {
    const params = new URLSearchParams(location.search);
    const title = params.get("title");
    const meta = params.get("meta");
    if (title) {
      document.getElementById("csTitle").textContent = title;
      document.title = `${title} — Minami Morikawa`;
    }
    if (meta) document.getElementById("csMeta").textContent = meta;
  })();
</script>
<script src="../js/main.js"></script>
</body>
</html>
